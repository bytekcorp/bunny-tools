name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # npm 11.5+ required for trusted publishing (OIDC). Node 20 ships with npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify generated artifacts are up to date
        run: |
          npm run gen:all
          git diff --exit-code manifest.json AGENTS.md schema/bunny.schema.json
      # Pre-1.0 we treat every RC as `latest` — there's no stable channel
      # yet, so users want `npm i bunny-tools` to give them the newest RC.
      # When 1.0.0 GA ships, revisit: prereleases (`-rc.*`, `-beta.*`) should
      # then publish to a `next` tag instead of clobbering `latest`.
      - name: Publish (OIDC trusted publishing — no token needed)
        run: npm publish --provenance --tag latest
